<!DOCTYPE html>

<html>

<head>
<title>🎯 Number Guessing Game</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#fff4d6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.game-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
    padding:10px 18px;
    margin:5px;
    font-size:15px;
    border:none;
    border-radius:8px;
    background:#ffd166;
    cursor:pointer;
}

button:hover{
    background:#f4b942;
}

input{
    padding:10px;
    width:150px;
    font-size:16px;
    text-align:center;
}

#timer{
    font-weight:bold;
    color:red;
}

#history{
    margin-top:10px;
    font-size:14px;
}

</style>

</head>

<body>

<div class="game-box">

<h1>🎯 Guess The Number</h1>

<p>Select Difficulty</p>

<button onclick="setDifficulty(50,50)">Easy</button> <button onclick="setDifficulty(100,70)">Medium</button> <button onclick="setDifficulty(500,90)">Hard</button>

<p id="rangeText"></p>

<p id="timer"></p>

<input id="guess" type="number" placeholder="Your guess">

<br><br>

<button onclick="check()">Guess</button>

<p id="result"></p>

<p id="history"></p>

<button onclick="restartGame()">🔁 Play Again</button>

</div>

<script>

let number;
let maxRange;
let attempts = 0;
let timeLeft;
let timer;
let guesses = [];

function setDifficulty(range,time){

maxRange = range;
number = Math.floor(Math.random()*range)+1;
attempts = 0;
timeLeft = time;
guesses = [];

document.getElementById("rangeText").innerHTML =
"Guess between 1 and " + range;

document.getElementById("result").innerHTML="";
document.getElementById("history").innerHTML="";

startTimer();

}

function startTimer(){

clearInterval(timer);

timer = setInterval(function(){

timeLeft--;

document.getElementById("timer").innerHTML =
"⏱ Time Left: " + timeLeft + "s";

if(timeLeft <= 0){

clearInterval(timer);

document.getElementById("result").innerHTML =
"❌ Time's up! Number was " + number;

}

},1000);

}

function check(){

let guess = Number(document.getElementById("guess").value);

if(!number){
alert("Please choose difficulty first!");
return;
}

attempts++;
guesses.push(guess);

document.getElementById("history").innerHTML =
"Previous guesses: " + guesses.join(", ");

if(guess < number){

document.getElementById("result").innerHTML="⬆ Try bigger!";

}

else if(guess > number){

document.getElementById("result").innerHTML="⬇ Try smaller!";

}

else{

clearInterval(timer);

document.getElementById("result").innerHTML =
"🎉 Correct! Attempts: " + attempts;



confetti({
particleCount:150,
spread:90,
origin:{ y:0.6 }
});

}

}

function restartGame(){
location.reload();
}

</script>

</body>

</html>
